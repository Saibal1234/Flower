<!DOCTYPE html>
<html>
<head>
<title>A Flower For You ❤️</title>

<style>
body{
background:black;
margin:0;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
height:100vh;
color:hotpink;
font-family:Arial;
}

canvas{
background:black;
}
</style>

</head>

<body>

<canvas id="canvas" width="800" height="600"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function flower(x,y){
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(x,y,3,0,Math.PI*2);
ctx.fill();
}

function tree(x,y,len,angle){

if(len < 10){
flower(x,y);
return;
}

let x2 = x + len*Math.cos(angle);
let y2 = y - len*Math.sin(angle);

ctx.strokeStyle="#8B4513";
ctx.lineWidth=2;

ctx.beginPath();
ctx.moveTo(x,y);
ctx.lineTo(x2,y2);
ctx.stroke();

let rand = Math.random()*0.3 + 0.35;

tree(x2,y2,len*0.75,angle+rand);
tree(x2,y2,len*0.75,angle-rand);

}

tree(400,550,110,Math.PI/2);

ctx.fillStyle="hotpink";
ctx.font="24px Arial";
ctx.textAlign="center";
ctx.fillText("A Little Special Gift for You, Tithi 💫🌸",400,590);

</script>

</body>
</html>
