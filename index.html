<!DOCTYPE html>
<html>
<head>
<title>A Flower For You ❤️</title>

<style>

body{
background:black;
margin:0;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
height:100vh;
}

canvas{
background:black;
}

</style>
</head>

<body>

<canvas id="canvas" width="900" height="650"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let branches = [];

function generateTree(x,y,len,angle){

if(len < 6){

// dense leaves
for(let i=0;i<4;i++){
branches.push({
type:"flower",
x:x + Math.random()*6-3,
y:y + Math.random()*6-3
});
}

return;
}

let x2 = x + len*Math.cos(angle);
let y2 = y - len*Math.sin(angle);

branches.push({
type:"branch",
x1:x,
y1:y,
x2:x2,
y2:y2
});

let rand = Math.random()*0.25 + 0.25;

// main branches
generateTree(x2,y2,len*0.75,angle + rand);
generateTree(x2,y2,len*0.75,angle - rand);

// extra branch to create dense crown
if(len > 20){
generateTree(x2,y2,len*0.70,angle + (Math.random()*0.4-0.2));
}

}

// straight trunk
let trunkX = 450;
let trunkY = 600;
let trunkLength = 110;

let trunkTopX = trunkX;
let trunkTopY = trunkY - trunkLength;

branches.push({
type:"branch",
x1:trunkX,
y1:trunkY,
x2:trunkTopX,
y2:trunkTopY
});

// generate canopy
generateTree(trunkTopX,trunkTopY,130,Math.PI/2);

let i = 0;

function draw(){

if(i >= branches.length){
showMessage();
return;
}

let b = branches[i];

if(b.type === "branch"){

ctx.strokeStyle="white";
ctx.lineWidth=2;

ctx.beginPath();
ctx.moveTo(b.x1,b.y1);
ctx.lineTo(b.x2,b.y2);
ctx.stroke();

}

if(b.type === "flower"){

ctx.fillStyle="white";

ctx.beginPath();
ctx.arc(b.x,b.y,2,0,Math.PI*2);
ctx.fill();

}

i++;

setTimeout(draw,2); // smooth animation

}

function showMessage(){

ctx.fillStyle="hotpink";
ctx.font="28px Arial";
ctx.textAlign="center";

ctx.fillText(
"A Little Special Gift for You, Tithi 💫🌸",
450,
630
);

}

draw();

</script>

</body>
</html>
