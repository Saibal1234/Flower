<!DOCTYPE html>
<html>
<head>
<title>A Flower For You ❤️</title>
<style>
body{
background:black;
margin:0;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
height:100vh;
}

canvas{
background:black;
}
</style>
</head>

<body>

<audio id="bgmusic" autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<canvas id="canvas" width="900" height="650"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let branches = [];

function generateTree(x,y,len,angle){

if(len < 9){
branches.push({type:"flower",x,y});
return;
}

let x2 = x + len*Math.cos(angle);
let y2 = y - len*Math.sin(angle);

branches.push({
type:"branch",
x1:x,
y1:y,
x2:x2,
y2:y2
});

let branchAngle = Math.PI/6; // 30 degrees like turtle

generateTree(x2,y2,len*0.75,angle + branchAngle);
generateTree(x2,y2,len*0.75,angle - branchAngle);
if(Math.random() > 0.4){
    generateTree(x2,y2,len*0.75,angle + branchAngle/2);
}



}

// slight left tilt like your turtle output
generateTree(450,600,130,Math.PI/2);

let i = 0;

function draw(){

if(i >= branches.length){
showMessage();
return;
}

let b = branches[i];

if(b.type === "branch"){

ctx.strokeStyle="white";
ctx.lineWidth=2;

ctx.beginPath();
ctx.moveTo(b.x1,b.y1);
ctx.lineTo(b.x2,b.y2);
ctx.stroke();

}

if(b.type === "flower"){

ctx.fillStyle="white";

ctx.beginPath();
ctx.arc(b.x,b.y,2.4,0,Math.PI*2);
ctx.fill();

}

i++;

setTimeout(draw,6); // fast but smooth

}

function showMessage(){

ctx.fillStyle="hotpink";
ctx.font="28px Arial";
ctx.textAlign="center";

ctx.fillText(
"A Little Special Gift for You, Pudu 💫❤️",
450,
630
);

}

draw();

document.body.addEventListener("click", function(){
document.getElementById("bgmusic").play();
});

</script>

</body>
</html>
