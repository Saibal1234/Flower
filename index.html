<!DOCTYPE html>
<html>
<head>
<title>Start Surprise</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:Arial;
background: radial-gradient(circle at top,#111,#000);
overflow:hidden;
}

/* Title */

h1{
color:hotpink;
font-size:55px;
text-align:center;
margin-bottom:50px;
text-shadow:
0 0 10px hotpink,
0 0 20px hotpink,
0 0 40px deeppink;
animation: glow 2s infinite alternate;
}

@keyframes glow{
from{
text-shadow:0 0 10px hotpink;
}
to{
text-shadow:0 0 25px hotpink,0 0 40px deeppink;
}
}

/* Button */

button{
padding:20px 50px;
font-size:26px;
border:none;
border-radius:40px;
background:linear-gradient(45deg,hotpink,deeppink);
color:white;
cursor:pointer;
box-shadow:0 0 20px hotpink;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 35px hotpink;
}

/* floating flowers */

.flower{
position:absolute;
top:-20px;
font-size:22px;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-10vh) rotate(0deg);
}
100%{
transform:translateY(110vh) rotate(360deg);
}
}

/* hearts */

.heart{
position:absolute;
font-size:20px;
color:pink;
animation:float 6s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
50%{
opacity:1;
}
100%{
transform:translateY(-10vh);
opacity:0;
}
}

</style>
</head>

<body>

<h1>✨ A Special Surprise For You ✨</h1>

<button onclick="startSurprise()">Tap to Start the Surprise 🎁</button>

<audio id="bgmusic" loop preload="auto">
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

function startSurprise(){

let music = document.getElementById("bgmusic");
music.play();

setTimeout(()=>{
window.location.href = "tree.html?play=true";
},500);

}

/* create falling flowers */

for(let i=0;i<25;i++){

let flower=document.createElement("div");
flower.innerHTML="🌸";
flower.className="flower";

flower.style.left=Math.random()*100+"vw";
flower.style.animationDuration=(4+Math.random()*5)+"s";
flower.style.fontSize=(18+Math.random()*25)+"px";

document.body.appendChild(flower);
}

/* floating hearts */

for(let i=0;i<15;i++){

let heart=document.createElement("div");
heart.innerHTML="💖";
heart.className="heart";

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(4+Math.random()*6)+"s";

document.body.appendChild(heart);
}

</script>

</body>
</html>
